name: Bootstrap AI Studio

on:
  push:
    branches: [main]
    paths:
      - ai-studio-mvp.zip
      - .github/workflows/bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unpack project into repository root
        shell: bash
        run: |
          set -euo pipefail
          test -f ai-studio-mvp.zip
          rm -rf .bootstrap
          mkdir -p .bootstrap
          unzip -q ai-studio-mvp.zip -d .bootstrap
          PROJECT_DIR="$(find .bootstrap -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "$PROJECT_DIR"
          shopt -s dotglob nullglob
          cp -a "$PROJECT_DIR"/* .
          rm -rf .bootstrap ai-studio-mvp.zip

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: |
          npm run lint
          npx tsc --noEmit
          npm run build

      - name: Commit unpacked source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Bootstrap deployable AI Studio source"
          git push
