name: Deploy Yagna AI Studio to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - DEPLOYMENT_STATUS.md
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Validate and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: shazan-yagna-studio
      PRODUCTION_URL: https://shazan-yagna-studio.pages.dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "Cloudflare credentials are not configured."
            echo "Add GitHub Actions secrets named CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

      - name: Validate application
        run: npm run build

      - name: Create clean Pages project if needed
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create shazan-yagna-studio --production-branch=main

      - name: Deploy Yagna production site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=shazan-yagna-studio --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify live Yagna homepage
        shell: bash
        run: |
          verified=0
          for attempt in $(seq 1 18); do
            echo "Verification attempt $attempt"
            if curl --fail --silent --show-error --location --max-time 20 \
              "$PRODUCTION_URL/?verify=${GITHUB_SHA}-${attempt}" \
              | grep -Fq "Shazan AI Studio | Yagna Engine"; then
              verified=1
              break
            fi
            sleep 10
          done

          if [[ "$verified" != "1" ]]; then
            echo "The live Pages domain did not serve the Yagna homepage."
            exit 1
          fi

      - name: Record verified deployment
        shell: bash
        run: |
          cat > DEPLOYMENT_STATUS.md <<EOF
          # Verified Cloudflare Deployment

          - Status: verified
          - URL: $PRODUCTION_URL
          - Source commit: $GITHUB_SHA
          - Verified at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          - Expected homepage: Shazan AI Studio | Yagna Engine
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENT_STATUS.md
          git commit -m "Record verified Cloudflare deployment [skip ci]" || exit 0
          git push