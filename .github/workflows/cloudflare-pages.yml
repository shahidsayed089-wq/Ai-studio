name: Deploy Yagna AI Studio to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Validate and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "Cloudflare credentials are not configured."
            echo "Add GitHub Actions secrets named CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

      - name: Validate application
        run: npm run build

      - name: Deploy production site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=ai-studio --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
